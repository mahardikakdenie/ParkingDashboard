<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="fav-grad-primary" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="50%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
    <linearGradient id="fav-grad-accent" x1="64" y1="0" x2="0" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#60A5FA"/>
      <stop offset="100%" stop-color="#A855F7"/>
    </linearGradient>
    <filter id="fav-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background Base Container -->
  <rect width="64" height="64" rx="16" fill="#0B132B"/>
  
  <!-- Outer Shield Polygon Boundary -->
  <path 
    d="M32 6L54 18.7V45.3L32 58L10 45.3V18.7L32 6Z" 
    stroke="url(#fav-grad-primary)" 
    stroke-width="3.5" 
    stroke-linejoin="round" 
    filter="url(#fav-glow)"
  />

  <!-- Futuristic Gate Barrier Vectors -->
  <path 
    d="M20 25L32 32.5L44 25" 
    stroke="url(#fav-grad-accent)" 
    stroke-width="3.5" 
    stroke-linecap="round" 
    stroke-linejoin="round"
  />
  <path 
    d="M20 37.5L32 45L44 37.5" 
    stroke="url(#fav-grad-primary)" 
    stroke-width="3.5" 
    stroke-linecap="round" 
    stroke-linejoin="round"
  />

  <!-- Active Status Core Pulse Dot -->
  <circle cx="32" cy="32" r="3.5" fill="#38BDF8"/>
</svg>
